name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Verify system tools
        run: |
          which uname || echo "uname not found"
          which xargs || echo "xargs not found"
          which find || echo "find not found"

      - name: Install Gradle
        run: |
          # Install all required utilities explicitly
          sudo apt-get update -qq && sudo apt-get install -y curl unzip
          mkdir -p /tmp/gradle
          cd /tmp/gradle
          curl -sSfL https://services.gradle.org/distributions/gradle-9.2.1-bin.zip -o gradle.zip
          unzip -q gradle.zip
          rm gradle.zip
          echo "/tmp/gradle/gradle-9.2.1/bin" >> $GITHUB_PATH
          # Verify java is available
          java -version

      - name: Install Android SDK command-line tools and packages
        run: |
          set -e
          SDK_ROOT="$ANDROID_SDK_ROOT"
          mkdir -p "$SDK_ROOT"
          mkdir -p "$SDK_ROOT/cmdline-tools"
          # download and install command line tools
          curl -sSfL https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -o /tmp/cmdline.zip
          unzip -q -o /tmp/cmdline.zip -d /tmp/cmdline
          mkdir -p "$SDK_ROOT/cmdline-tools/latest"
          mv /tmp/cmdline/cmdline-tools/* "$SDK_ROOT/cmdline-tools/latest/" || true
          rm -rf /tmp/cmdline /tmp/cmdline.zip
          export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          sdkmanager --sdk_root="$SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          # Accept licenses without using 'yes' to avoid broken pipe
          mkdir -p "$SDK_ROOT/licenses"
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$SDK_ROOT/licenses/android-sdk-license"
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > "$SDK_ROOT/licenses/android-google-tv-license"
          echo -e "\n7e7f75d18550e0f0f59b66fb1e3cc28a51e2e82a" > "$SDK_ROOT/licenses/google-gdk-license"

      - name: Build debug APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          PATH: ${{ env.ANDROID_SDK_ROOT }}/platform-tools:${{ env.PATH }}
        run: gradle --project-dir . assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
